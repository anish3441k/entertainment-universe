<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Entertainment Universe</title>

<link rel="stylesheet" href="index.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>

<body class="movies">

<div class="particles"></div>

<!-- MENU BUTTON -->

<div class="menu-btn" id="menuBtn" onclick="toggleSidebar()">

<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>

</div>

<!-- SIDEBAR -->

<aside class="sidebar" id="sidebar">

<button onclick="goHome()">🏠 Home</button>

<button onclick="openMovie()">🎬 Movies</button>

<button onclick="openWebSeries()">📺 Web Series</button>

<button onclick="openAnime()">🎌 Anime</button>

<button onclick="openAnimeMovie()">🍿 Anime Movies</button>

<button onclick="openGame()">🎮 Games</button>

<button onclick="openCartoon()">🧸 Cartoons</button>

<button onclick="openWishlist()">❤️ Wishlist</button>

<button onclick="openSettings()">⚙️ Settings</button>

</aside>

<!-- TOPBAR -->

<header class="topbar">

<div class="logo" onclick="goHome()">
ENTERTAINMENT UNIVERSE
</div>

<div class="search-box">

<input type="text"
placeholder="Search Movies, Anime, Games, Actors..."
onkeypress="globalSearch(event)"
oninput="showSuggestions(this.value)">

<div id="suggestionsBox"></div>

</div>

<div class="auth">

<button class="login-btn">
Login
</button>

<button class="signup-btn">
Signup
</button>

</div>

</header>

<!-- HERO -->

<section class="hero" id="home">

<div class="hero-overlay"></div>

<div class="hero-content">

<h1 id="heroTitle">
Interstellar
</h1>

<p id="heroText">
A team of explorers travel through a wormhole in space in an attempt to ensure humanity's survival.
</p>

<div class="hero-buttons">

<button class="watch-btn">
▶ Watch Trailer
</button>

<button class="info-btn" onclick="openMovie()">
More Info
</button>

</div>

</div>

</section>

<!-- TRENDING MOVIES -->

<section class="content-row">

<div class="row-header">
<h2>Trending Movies</h2>
</div>

<div class="movie-row" id="trendingMovies"></div>

</section>

<!-- CONTINUE WATCHING -->

<section class="content-row">

<div class="row-header">
<h2>Continue Watching</h2>
</div>



<div class="wide-card" onclick="openWebSeries()">

<img src="https://picsum.photos/700/400?32">

<div class="wide-overlay"></div>

<div class="wide-info">

<h3>Dark</h3>

<p>2 Episodes Remaining</p>

</div>

</div>

</div>

</section>

<script src="index.js"></script>
<script src="tmdb.js"></script>
<script src="router.js"></script>

</body>

</html>
